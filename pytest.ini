[pytest]
consider_namespace_packages = true
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short --strict-markers
log_cli = true
log_cli_level = INFO
pythonpath = . packages apps
markers =
    unit: fast unit tests
    integration: tests that require a running local or dockerized stack
    e2e: end-to-end tests that submit live research jobs
