services:
  axiom-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: axiom-api
    restart: unless-stopped
    ports:
      - "${AXIOM_API_PORT:-7200}:7200"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7200/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  axiom-council:
    build:
      context: .
      dockerfile: apps/council/Dockerfile
    container_name: axiom-council
    restart: unless-stopped
    ports:
      - "${AXIOM_COUNCIL_PORT:-7201}:7201"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7201/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  axiom-axiomatizer:
    build:
      context: .
      dockerfile: apps/axiomatizer/Dockerfile
    container_name: axiom-axiomatizer
    restart: unless-stopped
    ports:
      - "${AXIOM_AXIOMATIZER_PORT:-7202}:7202"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7202/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  axiom-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: axiom-web
    restart: unless-stopped
    ports:
      - "${AXIOM_WEB_PORT:-7100}:7100"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: "http://axiom-api:7200"
    depends_on:
      axiom-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7100/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
