services:
  axiom-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: axiom-api
    restart: unless-stopped
    ports:
      - "${AXIOM_API_PORT:-7200}:7200"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7200/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  axiom-council:
    build:
      context: .
      dockerfile: apps/council/Dockerfile
    container_name: axiom-council
    restart: unless-stopped
    ports:
      - "${AXIOM_COUNCIL_PORT:-7201}:7201"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7201/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  axiom-axiomatizer:
    build:
      context: .
      dockerfile: apps/axiomatizer/Dockerfile
    container_name: axiom-axiomatizer
    restart: unless-stopped
    ports:
      - "${AXIOM_AXIOMATIZER_PORT:-7202}:7202"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7202/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  axiom-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: axiom-web
    ports:
      - "7100:7100"
    env_file:
      - .env
    depends_on:
      axiom-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(\"http://127.0.0.1:7100/api/health\").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
