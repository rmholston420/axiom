services:

  axiom-redis:
    image: redis:7-alpine
    container_name: axiom-redis
    restart: unless-stopped
    volumes:
      - axiom_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  axiom-neo4j:
    image: neo4j:5
    container_name: axiom-neo4j
    environment:
      NEO4J_AUTH: neo4j/collosus
    volumes:
      - axiom_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

  axiom-ollama:
    image: ollama/ollama:latest
    container_name: axiom-ollama
    volumes:
      - axiom_ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

  axiom-ollama-init:
    image: curlimages/curl:8.10.1
    depends_on:
      axiom-ollama:
        condition: service_started
    restart: "no"
    command:
      - sh
      - -c
      - |
          set -e
          until curl -fsS http://axiom-ollama:11434/api/tags >/dev/null; do
            sleep 2
          done
          curl -fsS http://axiom-ollama:11434/api/pull \
            -H 'Content-Type: application/json' \
            -d '{"model":"llama3.2:3b","stream":false}'
          curl -fsS http://axiom-ollama:11434/api/pull \
            -H 'Content-Type: application/json' \
            -d '{"model":"qwen3-coder:latest","stream":false}'

  axiom-api:
    depends_on:
      axiom-ollama-init:
        condition: service_completed_successfully
      axiom-redis:
        condition: service_healthy
      axiom-neo4j:
        condition: service_healthy
      axiom-ollama:
        condition: service_started
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: axiom-api
    restart: unless-stopped
    ports:
      - "${AXIOM_API_PORT:-7200}:7200"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7200/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  axiom-council:
    depends_on:
      axiom-ollama-init:
        condition: service_completed_successfully
      axiom-redis:
        condition: service_healthy
      axiom-neo4j:
        condition: service_healthy
      axiom-ollama:
        condition: service_started
    build:
      context: .
      dockerfile: apps/council/Dockerfile
    container_name: axiom-council
    restart: unless-stopped
    ports:
      - "${AXIOM_COUNCIL_PORT:-7201}:7201"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7201/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  axiom-axiomatizer:
    depends_on:
      axiom-ollama-init:
        condition: service_completed_successfully
      axiom-redis:
        condition: service_healthy
      axiom-neo4j:
        condition: service_healthy
      axiom-ollama:
        condition: service_started
    build:
      context: .
      dockerfile: apps/axiomatizer/Dockerfile
    container_name: axiom-axiomatizer
    restart: unless-stopped
    ports:
      - "${AXIOM_AXIOMATIZER_PORT:-7202}:7202"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7202/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  axiom-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: axiom-web
    restart: unless-stopped
    ports:
      - "${AXIOM_WEB_PORT:-7100}:7100"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://axiom-api:7200
      API_ORIGIN: http://axiom-api:7200
    depends_on:
      axiom-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(\"http://127.0.0.1:7100/api/health\").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  axiom_redis_data:
  axiom_neo4j_data:
  axiom_ollama_data:
