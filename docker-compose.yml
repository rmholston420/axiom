services:
  axiom-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: axiom-api
    restart: unless-stopped
    ports:
      - "${AXIOM_API_PORT:-7200}:7200"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7200/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
