target-version = "py311"
line-length = 100

[lint]
select = [
  "E",
  "W",
  "F",
  "I",
  "B",
  "C4",
  "UP",
  "N",
]
ignore = []

[lint.isort]
known-first-party = [
  "axiom_core",
  "axiom_research",
  "axiom_graph",
  "axiom_providers",
  "axiom_contracts",
]

[format]
quote-style = "double"
indent-style = "space"
