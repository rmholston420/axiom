# Axiom — ruff linter + formatter config
[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
  "N",   # pep8-naming
  "ANN", # flake8-annotations (type hints)
]
ignore = [
  "ANN101", # missing type annotation for self
  "ANN102", # missing type annotation for cls
  "ANN401", # dynamically typed expressions (Any)
]

[tool.ruff.lint.isort]
known-first-party = ["axiom_core", "axiom_research", "axiom_graph", "axiom_providers", "axiom_contracts"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
