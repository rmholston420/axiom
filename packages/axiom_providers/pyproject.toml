[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "axiom-providers"
version = "0.1.0"
description = "External providers for Axiom (Ollama, SearxNG, Valkey)"
authors = [{ name = "rmholston" }]
requires-python = ">=3.10"
dependencies = [
  "httpx>=0.27.0",
  "redis>=5.0.0",
]

[tool.setuptools]
packages = ["axiom_providers"]

[tool.setuptools.package-dir]
axiom_providers = "."
