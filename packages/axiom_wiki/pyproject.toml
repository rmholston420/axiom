[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "axiom-wiki"
version = "0.1.0"
description = "Graph-first wiki generation layer for Axiom"
authors = [{ name = "rmholston" }]
requires-python = ">=3.10"
dependencies = [
  "neo4j>=5.0.0",
  "pydantic>=2.0.0",
  "httpx>=0.27.0",
]

[tool.setuptools]
packages = ["axiom_wiki"]

[tool.setuptools.package-dir]
axiom_wiki = "."
